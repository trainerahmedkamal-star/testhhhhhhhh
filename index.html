<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة نطق AI احترافي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f4f7f9; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; }
        h2 { color: #333; margin-bottom: 10px; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 15px; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; resize: none; }
        button { background: #4f46e5; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; transition: background 0.3s; width: 100%; }
        button:hover { background: #4338ca; }
        button:disabled { background: #a5a2d9; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; color: #666; min-height: 20px; }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-top: 10px; display: none; overflow: hidden; }
        .progress-fill { height: 100%; background: #4f46e5; width: 0%; transition: width 0.2s; }
    </style>
</head>
<body>

<div class="card">
    <h2>AI TTS Local Test</h2>
    <p style="color: #666; font-size: 14px;">نطق بشري عالي الجودة يعمل داخل المتصفح</p>
    
    <textarea id="textInput" rows="3" placeholder="اكتب نصاً بالإنجليزية هنا...">Hello! I am a high-quality AI voice running entirely in your browser without a server.</textarea>
    
    <button id="speakBtn" disabled>جاري تجهيز المحرك...</button>
    
    <div class="progress-bar" id="progressContainer">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="status">جاري الاتصال بسيرفر الموديلات...</div>
</div>

<script type="module">
    // استدعاء المكتبة من CDN موثوق
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    let synthesizer;
    const btn = document.getElementById('speakBtn');
    const status = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');

    async function init() {
        try {
            // تحميل موديل VITS عالي الجودة ومصغر للويب
            synthesizer = await pipeline('text-to-speech', 'Xenova/vits-ljspeech', {
                quantized: true,
                progress_callback: (progress) => {
                    if (progress.status === 'initiate') {
                        progressContainer.style.display = 'block';
                        status.innerText = "بدء تحميل ملفات الموديل...";
                    }
                    if (progress.status === 'progress') {
                        const percent = Math.round(progress.loaded);
                        progressFill.style.width = percent + '%';
                        status.innerText = `جاري التحميل: ${percent}%`;
                    }
                    if (progress.status === 'done') {
                        status.innerText = "جاري تثبيت الموديل في المتصفح...";
                    }
                    if (progress.status === 'ready') {
                        status.innerText = "المحرك جاهز! اضغط للتشغيل.";
                        btn.innerText = "تشغيل النطق";
                        btn.disabled = false;
                        progressContainer.style.display = 'none';
                    }
                }
            });
        } catch (e) {
            console.error(e);
            status.innerText = "حدث خطأ أثناء التحميل. يرجى تحديث الصفحة.";
            status.style.color = "red";
        }
    }

    async function speak() {
        const text = document.getElementById('textInput').value;
        if (!text) return;

        btn.disabled = true;
        status.innerText = "جاري توليد الصوت... (لحظات)";

        try {
            // توليد الصوت محلياً بالكامل
            const output = await synthesizer(text);
            
            // تشغيل الصوت الناتج باستخدام AudioContext
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const buffer = audioContext.createBuffer(1, output.audio.length, output.sampling_rate);
            buffer.getChannelData(0).set(output.audio);
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start();
            
            status.innerText = "تم النطق بنجاح!";
        } catch (e) {
            console.error(e);
            status.innerText = "خطأ في توليد الصوت.";
        } finally {
            btn.disabled = false;
        }
    }

    btn.addEventListener('click', speak);
    init();
</script>

</body>
</html>
