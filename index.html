<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TTS - تجربة نهائية</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin-bottom: 15px; }
        button { background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h3>محرك نطق AI محلي</h3>
    <textarea id="textInput" rows="3">Hello, this is a test of the local voice engine.</textarea>
    <button id="speakBtn" disabled>جاري الاتصال...</button>
    <div id="status">انتظار الرد من السيرفر...</div>
</div>

<script type="module">
    // استخدام رابط مكتبة بديل (esm.sh) أحياناً يكون أسرع في مصر
    import { pipeline, env } from 'https://esm.sh/@xenova/transformers@2.17.1';

    // إعدادات إضافية لتخطي مشاكل الحظر
    env.allowLocalModels = false; 
    env.useBrowserCache = true;

    let synthesizer;
    const btn = document.getElementById('speakBtn');
    const status = document.getElementById('status');

    async function init() {
        try {
            status.innerText = "بدء التحميل (لو تأخر جرب فتح VPN)...";
            
            // محاولة تحميل الموديل
            synthesizer = await pipeline('text-to-speech', 'Xenova/vits-ljspeech', {
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        status.innerText = `جاري التحميل: ${Math.round(p.loaded)}%`;
                    }
                    if (p.status === 'ready') {
                        status.innerText = "جاهز للعمل!";
                        btn.innerText = "اسمع الصوت";
                        btn.disabled = false;
                    }
                }
            });
        } catch (e) {
            console.error(e);
            status.innerText = "فشل التحميل. جرب تحديث الصفحة أو استخدام VPN.";
        }
    }

    async function speak() {
        const text = document.getElementById('textInput').value;
        btn.disabled = true;
        status.innerText = "يتم التوليد الآن...";
        try {
            const output = await synthesizer(text);
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const buffer = audioContext.createBuffer(1, output.audio.length, output.sampling_rate);
            buffer.getChannelData(0).set(output.audio);
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start();
            status.innerText = "تم النطق!";
        } catch (e) {
            status.innerText = "خطأ في التشغيل.";
        } finally {
            btn.disabled = false;
        }
    }

    btn.addEventListener('click', speak);
    init();
</script>

</body>
</html>
